name: CI Unit Tests ASD

on:
  push:
    branches:
      - main
      - dev
      - 'feat/**'

  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run unit tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --tb=short
          else
            echo "Folder tests tidak ditemukan"
          fi

      - name: Run main program
        run: |
          if [ -f src/main.py ]; then
            python src/main.py
          else
            echo "src/main.py tidak ditemukan"